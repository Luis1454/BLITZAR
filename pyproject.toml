[tool.pytest.ini_options]
addopts = "-q --basetemp=.pytest-basetemp-checks"
testpaths = ["tests/checks/suites"]

[tool.ruff]
target-version = "py312"
line-length = 140
exclude = [
  "build",
  "build-*",
  ".git",
  ".pytest_cache",
  ".pytest-basetemp*",
  "__pycache__",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E402", "E501"]

[tool.mypy]
python_version = "3.12"
warn_unused_configs = true
warn_unused_ignores = true
warn_return_any = true
check_untyped_defs = true
no_implicit_optional = true
exclude = "(^build/|^build-|^\\.git/|^\\.pytest_cache/|^\\.pytest-basetemp)"
