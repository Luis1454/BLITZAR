# Test configuration for 1M particle validation of tiled kernels
simulation(particle_count=1000000, dt=0.01, solver=pairwise_cuda, integrator=leapfrog)

[physics]
softening_parameter=0.01
opening_criterion_theta=0.5
max_acceleration=100.0

[gpu]
target_octree_leaf_capacity=256
vram_debug_log=1

[perf]
step_summary_interval=10

[init]
method=disk_orbit
disk_radius=10.0
mass_exp=1.0
