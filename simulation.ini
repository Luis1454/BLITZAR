# ==================================================
# CUDA gravity simulation config
# Generated automatically. Edit values then restart.
# ==================================================

# [Simulation]
# Total number of particles simulated by backend.
particle_count=100000
# Fixed simulation timestep.
dt=0.1
# Gravity solver: pairwise_cuda | octree_gpu | octree_cpu
solver=pairwise_cuda
# Time integrator: euler | rk4
integrator=euler

# [Octree]
# Barnes-Hut opening angle.
octree_theta=1.2
# Distance softening used in octree force evaluation.
octree_softening=0.05

# [Frontend defaults]
# Rendering cap for displayed particles.
frontend_particle_cap=10000
# Initial camera zoom.
default_zoom=8
# Initial particle alpha [0..255].
default_luminosity=100
# UI refresh target FPS.
ui_fps_limit=60

# [Export]
# Directory used for snapshot exports.
export_directory=C:/Users/luisf/EpitechPromo2027/CUDA-GRAVITY-SIMULATION/exports
# Snapshot format: vtk | vtk_binary | xyz | bin
export_format=bin

# [Initial state file import]
# Leave empty to disable direct file import.
input_file=
# Input file format: auto | vtk | vtk_binary | xyz | bin
input_format=auto

# [Quick preset initialization]
# init_config_style: preset | detailed
# preset mode uses only basic info (structure, size, velocity_temperature, particle_count).
init_config_style=preset
# preset_structure: disk_orbit | random_cloud | file
preset_structure=disk_orbit
# characteristic size of generated structure.
preset_size=12
# random velocity agitation (unitless). 0 disables thermal noise.
velocity_temperature=2
# initial temperature assigned to generated particles.
particle_temperature=0
# thermal model used during simulation.
# NOTE: non-zero heating/radiation alter total energy evolution.
# Keep both at 0 for near-conservative runs.
# thermal_radiation_coeff acts as emissivity scale for Stefan-Boltzmann exchange.
thermal_ambient_temperature=0
thermal_specific_heat=1
thermal_heating_coeff=0
thermal_radiation_coeff=0

# [Initial state generation]
# init_mode: disk_orbit | random_cloud | file
# - file: tries input_file first
# - disk_orbit/random_cloud: generated from init_* keys below
# NOTE: used when init_config_style=detailed
init_mode=file
# RNG seed for generated states.
init_seed=42
# Add central body before generated particles.
init_include_central_body=true
# Central body mass and initial state.
init_central_mass=1
init_central_x=0
init_central_y=0
init_central_z=0
init_central_vx=0
init_central_vy=0
init_central_vz=0
# disk_orbit parameters.
init_disk_mass=1e+06
init_disk_radius_min=1.5
init_disk_radius_max=11.5
init_disk_thickness=0
init_velocity_scale=1
# random_cloud parameters.
init_cloud_half_extent=12
init_cloud_speed=0
init_particle_mass=0.01

# [SPH option]
# SPH can be enabled independently of gravity solver.
sph_enabled=false
sph_smoothing_length=1.25
sph_rest_density=0
sph_gas_constant=4
sph_viscosity=0.08

# [Energy monitoring]
# Compute energies every N steps.
energy_measure_every_steps=1
# Max particles used for sampled energy estimation.
energy_sample_limit=5000
