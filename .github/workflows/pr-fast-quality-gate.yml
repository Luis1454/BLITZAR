name: pr-fast-quality-gate

on:
  workflow_call:
    inputs:
      diff-base:
        required: false
        type: string
        default: ""
      diff-target:
        required: false
        type: string
        default: ""

env:
  CI_CACHE_VERSION: v1
  CI_PYTHON_VERSION: "3.12"

jobs:
  space-quality-gate:
    name: NASA-First Quality Gate (linux-ubuntu24.04 / hosted-gnu + clang-tidy / python3.12)
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "${{ env.CI_PYTHON_VERSION }}"
      - name: Cache metadata
        id: cache-meta
        shell: bash
        run: |
          echo "pip-prefix=pip-${{ env.CI_CACHE_VERSION }}-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}" >> "$GITHUB_OUTPUT"
          echo "build-prefix=cmake-${{ env.CI_CACHE_VERSION }}-${{ runner.os }}-linux-clang-ninja-prod-tests" >> "$GITHUB_OUTPUT"
      - name: Restore pip cache
        id: restore-pip-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/pip
          key: ${{ steps.cache-meta.outputs.pip-prefix }}-${{ hashFiles('.github/workflows/pr-fast.yml', '.github/workflows/pr-fast-quality-gate.yml') }}
          restore-keys: |
            ${{ steps.cache-meta.outputs.pip-prefix }}-
      - name: Install build and analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y make ninja-build clang-tidy
          python -m pip install --upgrade pip
          python -m pip install pytest ruff mypy
      - name: Save pip cache
        if: ${{ success() && steps.restore-pip-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/pip
          key: ${{ steps.restore-pip-cache.outputs.cache-primary-key }}
      - name: Restore CMake and dependency cache
        id: restore-build-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            build-quality
            ~/.cache/vcpkg/archives
          key: ${{ steps.cache-meta.outputs.build-prefix }}-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake', 'tests/CMakeLists.txt', 'tests/cmake/**/*.cmake', 'simulation.ini', '.github/workflows/pr-fast-quality-gate.yml') }}
          restore-keys: |
            ${{ steps.cache-meta.outputs.build-prefix }}-
      - {name: Verify clang-tidy availability, run: clang-tidy --version}
      - name: Generate tool qualification manifest
        run: python scripts/ci/release/package_tool_manifest.py --lane pr-fast --profile prod --output dist/tool-qualification/tool_manifest.json
      - name: Run repository quality checks
        run: make quality-local CONFIG=simulation.ini
      - name: Run Python style/type checks
        run: make quality-python
      - name: Configure strict integration build
        run: make quality-configure QUALITY_BUILD_DIR=build-quality
      - {name: Build strict integration targets, run: make quality-build QUALITY_BUILD_DIR=build-quality}
      - name: Run clang-tidy analyzer checks
        run: >-
          make quality-analyze
          QUALITY_BUILD_DIR=build-quality
          QUALITY_TIDY_JOBS=0
          QUALITY_TIDY_DIFF_BASE=${{ inputs.diff-base }}
          QUALITY_TIDY_DIFF_TARGET=${{ inputs.diff-target }}
      - name: Run integration tests under sanitizers
        run: make quality-test QUALITY_BUILD_DIR=build-quality
      - name: Save CMake and dependency cache
        if: ${{ success() && steps.restore-build-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: |
            build-quality
            ~/.cache/vcpkg/archives
          key: ${{ steps.restore-build-cache.outputs.cache-primary-key }}
      - name: Upload tool qualification manifest
        uses: actions/upload-artifact@v4
        with:
          name: tool-qualification-pr-fast-${{ github.run_number }}
          path: dist/tool-qualification/tool_manifest.json
          if-no-files-found: error
