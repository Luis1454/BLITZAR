name: nightly-full

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-full-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nightly-hosted-standalone-tests:
    name: Nightly Hosted Standalone Tests
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC toolchain
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure standalone hosted tests
        shell: pwsh
        run: |
          cmake -S tests/hosted -B build-hosted -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build standalone hosted tests
        shell: pwsh
        run: |
          cmake --build build-hosted --parallel

      - name: Run hosted-safe tests
        shell: pwsh
        run: |
          ctest --test-dir build-hosted --output-on-failure --timeout 180 --repeat until-fail:3

      - name: Explain GPU test scope
        shell: pwsh
        run: |
          @"
          Hosted nightly lane runs standalone C++ tests (config + args) without CUDA installation.
          Full physics CUDA tests remain in the optional self-hosted NVIDIA runner job.
          Set repository variable HAS_GPU_RUNNER=true to enable the optional GPU job.
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Upload test and build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-full-logs-${{ github.run_number }}
          path: |
            build-hosted/Testing/**/*.log
            build-hosted/CMakeFiles/CMakeOutput.log
            build-hosted/CMakeFiles/CMakeError.log
          if-no-files-found: ignore

  nightly-gpu-full-tests:
    name: Nightly GPU Full Tests (optional)
    if: ${{ vars.HAS_GPU_RUNNER == 'true' }}
    runs-on: [self-hosted, windows, x64, cuda]
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC toolchain
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Validate CUDA runtime/toolchain presence
        shell: pwsh
        run: |
          $hasNvidiaSmi = Get-Command nvidia-smi -ErrorAction SilentlyContinue
          $hasNvcc = Get-Command nvcc -ErrorAction SilentlyContinue
          if (-not $hasNvidiaSmi) {
            throw "nvidia-smi not found. Runner does not expose NVIDIA driver/runtime."
          }
          if (-not $hasNvcc) {
            throw "nvcc not found in PATH. Install CUDA Toolkit or expose nvcc in runner environment."
          }
          nvidia-smi
          nvcc --version

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --parallel

      - name: Run full tests
        shell: pwsh
        run: |
          ctest --test-dir build --output-on-failure --timeout 300
