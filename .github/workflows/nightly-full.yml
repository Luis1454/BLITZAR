name: nightly-full

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: nightly-full-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nightly-hosted-standalone-tests:
    name: Nightly Hosted Standalone Tests
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC toolchain
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure standalone hosted tests
        shell: pwsh
        run: |
          cmake -S tests/hosted -B build-hosted -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build standalone hosted tests
        shell: pwsh
        run: |
          cmake --build build-hosted --parallel

      - name: Run hosted-safe tests
        shell: pwsh
        run: |
          ctest --test-dir build-hosted --output-on-failure --timeout 180 --repeat until-fail:3

      - name: Explain GPU test scope
        shell: pwsh
        run: |
          @"
          Hosted nightly lane runs standalone C++ tests (config + args) without CUDA installation.
          Full physics CUDA tests remain in the optional self-hosted NVIDIA runner job.
          Set repository variable HAS_GPU_RUNNER=true to enable the optional GPU job.
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Upload test and build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-full-logs-${{ github.run_number }}
          path: |
            build-hosted/Testing/**/*.log
            build-hosted/CMakeFiles/CMakeOutput.log
            build-hosted/CMakeFiles/CMakeError.log
          if-no-files-found: ignore

  nightly-hosted-coverage:
    name: Nightly Hosted Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install coverage tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          python3 -m pip install --upgrade pip
          python3 -m pip install gcovr

      - name: Configure coverage build
        run: |
          cmake -S tests/hosted -B build-hosted-cov -G Ninja -DCMAKE_BUILD_TYPE=Debug -DGRAVITY_HOSTED_ENABLE_COVERAGE=ON

      - name: Build coverage target
        run: |
          cmake --build build-hosted-cov --parallel

      - name: Run hosted tests for coverage
        run: |
          ctest --test-dir build-hosted-cov --output-on-failure --timeout 180

      - name: Generate coverage report
        id: coverage
        run: |
          gcovr \
            --root "${GITHUB_WORKSPACE}" \
            --object-directory build-hosted-cov \
            --filter "src/cpp/sim" \
            --exclude "build-hosted-cov/_deps" \
            --exclude "tests/" \
            --xml-pretty \
            --output build-hosted-cov/coverage.xml \
            --html-details build-hosted-cov/coverage.html
          gcovr \
            --root "${GITHUB_WORKSPACE}" \
            --object-directory build-hosted-cov \
            --filter "src/cpp/sim" \
            --exclude "build-hosted-cov/_deps" \
            --exclude "tests/" \
            --print-summary | tee build-hosted-cov/coverage-summary.txt
          LINES_PCT="$(awk '/^lines:/{gsub("%","",$2); print $2}' build-hosted-cov/coverage-summary.txt)"
          FUNCS_PCT="$(awk '/^functions:/{gsub("%","",$2); print $2}' build-hosted-cov/coverage-summary.txt)"
          BRANCH_PCT="$(awk '/^branches:/{gsub("%","",$2); print $2}' build-hosted-cov/coverage-summary.txt)"
          echo "lines_pct=${LINES_PCT}" >> "$GITHUB_OUTPUT"
          echo "funcs_pct=${FUNCS_PCT}" >> "$GITHUB_OUTPUT"
          echo "branch_pct=${BRANCH_PCT}" >> "$GITHUB_OUTPUT"
          {
            echo "## Hosted coverage percentages"
            echo ""
            echo "| Metric | Percent |"
            echo "|---|---:|"
            echo "| Lines | ${LINES_PCT}% |"
            echo "| Functions | ${FUNCS_PCT}% |"
            echo "| Branches | ${BRANCH_PCT}% |"
            echo ""
            echo "Raw summary:"
            echo '```text'
            cat build-hosted-cov/coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=Coverage percentages::lines=${LINES_PCT}% functions=${FUNCS_PCT}% branches=${BRANCH_PCT}%"

      - name: Publish coverage status check
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const ok = '${{ job.status }}' === 'success';
            const lines = '${{ steps.coverage.outputs.lines_pct }}';
            const funcs = '${{ steps.coverage.outputs.funcs_pct }}';
            const branches = '${{ steps.coverage.outputs.branch_pct }}';
            const description = lines
              ? `L${lines}% F${funcs}% B${branches}%`
              : 'Coverage summary unavailable';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: ok ? 'success' : 'failure',
              context: 'coverage/hosted',
              description,
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-hosted-coverage-${{ github.run_number }}
          path: |
            build-hosted-cov/coverage.xml
            build-hosted-cov/coverage.html
            build-hosted-cov/coverage-summary.txt
          if-no-files-found: error

  nightly-gpu-full-tests:
    name: Nightly GPU Full Tests (optional)
    if: ${{ vars.HAS_GPU_RUNNER == 'true' }}
    runs-on: [self-hosted, windows, x64, cuda]
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC toolchain
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Validate CUDA runtime/toolchain presence
        shell: pwsh
        run: |
          $hasNvidiaSmi = Get-Command nvidia-smi -ErrorAction SilentlyContinue
          $hasNvcc = Get-Command nvcc -ErrorAction SilentlyContinue
          if (-not $hasNvidiaSmi) {
            throw "nvidia-smi not found. Runner does not expose NVIDIA driver/runtime."
          }
          if (-not $hasNvcc) {
            throw "nvcc not found in PATH. Install CUDA Toolkit or expose nvcc in runner environment."
          }
          nvidia-smi
          nvcc --version

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --parallel

      - name: Run full tests
        shell: pwsh
        run: |
          ctest --test-dir build --output-on-failure --timeout 300
