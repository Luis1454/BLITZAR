name: nightly-full
on:
  push:
    branches: [main]
    paths-ignore: [README.md]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
permissions:
  contents: read
  statuses: write
env:
  CI_CACHE_VERSION: v1
  CI_PYTHON_VERSION: "3.12"
concurrency:
  group: nightly-full-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  nightly-integration-standalone-tests:
    name: Nightly Integration Standalone Tests (windows-2022 / msvc2022-x64 / python3.12)
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - {name: Checkout, uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd}
      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with: {python-version: "${{ env.CI_PYTHON_VERSION }}"}
      - name: Restore pip cache
        id: restore-pip-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~\AppData\Local\pip\Cache
          key: windows-pip-${{ env.CI_CACHE_VERSION }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('.github/ci/requirements-py312.txt', '.github/workflows/nightly-full.yml') }}
          restore-keys: |
            windows-pip-${{ env.CI_CACHE_VERSION }}-${{ steps.setup-python.outputs.python-version }}-
      - name: Install Python test tooling
        shell: pwsh
        run: python -m pip install -r .github/ci/requirements-py312.txt
      - name: Save pip cache
        if: ${{ success() && steps.restore-pip-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~\AppData\Local\pip\Cache
          key: windows-pip-${{ env.CI_CACHE_VERSION }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('.github/ci/requirements-py312.txt', '.github/workflows/nightly-full.yml') }}
      - name: Setup MSVC toolchain
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756
        with: {arch: x64}
      - name: Restore integration build cache
        id: restore-build-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            build-integration
            ~\AppData\Local\vcpkg\archives
            C:\vcpkg\installed
            C:\vcpkg\packages
          key: windows-build-integration-${{ env.CI_CACHE_VERSION }}-msvc-prod-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake', 'tests/CMakeLists.txt', 'tests/cmake/**/*.cmake', 'simulation.ini', '.github/workflows/nightly-full.yml') }}
          restore-keys: |
            windows-build-integration-${{ env.CI_CACHE_VERSION }}-msvc-prod-
      - name: Run repository quality gate
        shell: pwsh
        run: python tests/checks/check.py all --root . --config simulation.ini
      - name: Run Python style/type checks
        shell: pwsh
        run: |
          python -m ruff check .
          python -m mypy tests/checks scripts/ci python_tools
          python -m pytest -q tests/checks/suites
      - name: Configure standalone integration tests
        shell: pwsh
        run: cmake -S tests -B build-integration -G Ninja -DCMAKE_BUILD_TYPE=Release -DGRAVITY_PROFILE=prod -DGRAVITY_INTEGRATION_STRICT_WARNINGS=ON
      - name: Build standalone integration tests
        shell: pwsh
        run: cmake --build build-integration --parallel
      - name: Run integration-safe tests
        shell: pwsh
        run: ctest --test-dir build-integration --output-on-failure --timeout 180 --no-tests=error --repeat until-fail:3 -R "TST_UNT_CONF_|TST_QLT_REPO_00(1|2|3|4|6|7)_"
      - name: Package FMEA status snapshot
        shell: pwsh
        run: python scripts/ci/nightly/package_fmea_status.py --root . --dist-dir dist/fmea-status
      - name: Upload FMEA status snapshot
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: nightly-fmea-status-${{ github.run_number }}
          path: dist/fmea-status
          if-no-files-found: error
      - name: Upload test and build logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: nightly-full-logs-${{ github.run_number }}
          path: |
            build-integration/Testing/**/*.log
            build-integration/CMakeFiles/CMakeOutput.log
            build-integration/CMakeFiles/CMakeError.log
          if-no-files-found: ignore
      - name: Save integration build cache
        if: ${{ success() && steps.restore-build-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            build-integration
            ~\AppData\Local\vcpkg\archives
            C:\vcpkg\installed
            C:\vcpkg\packages
          key: windows-build-integration-${{ env.CI_CACHE_VERSION }}-msvc-prod-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake', 'tests/CMakeLists.txt', 'tests/cmake/**/*.cmake', 'simulation.ini', '.github/workflows/nightly-full.yml') }}
  nightly-integration-coverage:
    name: Nightly Integration Coverage (linux-ubuntu24.04 / hosted-gnu / python3.12)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - {name: Checkout, uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd}
      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with: {python-version: "${{ env.CI_PYTHON_VERSION }}"}
      - name: Restore pip cache
        id: restore-pip-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.cache/pip
          key: linux-pip-${{ env.CI_CACHE_VERSION }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('.github/ci/requirements-py312.txt', '.github/workflows/nightly-full.yml') }}
          restore-keys: |
            linux-pip-${{ env.CI_CACHE_VERSION }}-${{ steps.setup-python.outputs.python-version }}-
      - name: Run repository quality gate
        run: python3 tests/checks/check.py all --root . --config simulation.ini
      - name: Install coverage tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          python3 -m pip install -r .github/ci/requirements-py312.txt
      - name: Save pip cache
        if: ${{ success() && steps.restore-pip-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.cache/pip
          key: linux-pip-${{ env.CI_CACHE_VERSION }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('.github/ci/requirements-py312.txt', '.github/workflows/nightly-full.yml') }}
      - name: Restore coverage build cache
        id: restore-build-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            build-integration-cov
            ~/.cache/vcpkg/archives
          key: linux-build-coverage-${{ env.CI_CACHE_VERSION }}-gcc-prod-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake', 'tests/CMakeLists.txt', 'tests/cmake/**/*.cmake', 'simulation.ini', '.github/workflows/nightly-full.yml') }}
          restore-keys: |
            linux-build-coverage-${{ env.CI_CACHE_VERSION }}-gcc-prod-
      - name: Run Python style/type checks
        run: |
          python3 -m ruff check .
          python3 -m mypy tests/checks scripts/ci python_tools
          python3 -m pytest -q tests/checks/suites
      - name: Configure coverage build
        run: cmake -S tests -B build-integration-cov -G Ninja -DCMAKE_BUILD_TYPE=Debug -DGRAVITY_PROFILE=prod -DGRAVITY_INTEGRATION_ENABLE_COVERAGE=ON -DGRAVITY_INTEGRATION_STRICT_WARNINGS=ON
      - name: Build coverage target
        run: cmake --build build-integration-cov --parallel
      - name: Run integration tests for coverage
        run: ctest --test-dir build-integration-cov --output-on-failure --timeout 180 --no-tests=error -R "TST_UNT_CONF_|TST_QLT_REPO_00(1|2|3|4|6|7)_"
      - {name: Generate coverage report, id: coverage, run: bash scripts/ci/nightly/generate_coverage.sh}
      - name: Build coverage dashboard payload
        if: ${{ github.ref == 'refs/heads/main' }}
        run: python3 scripts/ci/nightly/build_dashboard.py
        env:
          LINES_PCT: ${{ steps.coverage.outputs.lines_pct }}
          FUNCS_PCT: ${{ steps.coverage.outputs.funcs_pct }}
          BRANCH_PCT: ${{ steps.coverage.outputs.branch_pct }}
      - name: Upload coverage dashboard pages artifact
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b
        with: {path: coverage-dashboard}
      - name: Publish coverage status check
        if: always()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const ok = '${{ job.status }}' === 'success';
            const lines = '${{ steps.coverage.outputs.lines_pct }}';
            const funcs = '${{ steps.coverage.outputs.funcs_pct }}';
            const branches = '${{ steps.coverage.outputs.branch_pct }}';
            const description = lines ? `L${lines}% F${funcs}% B${branches}%` : 'Coverage summary unavailable';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner, repo: context.repo.repo, sha: context.sha,
              state: ok ? 'success' : 'failure', context: 'coverage/integration',
              description, target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: nightly-integration-coverage-${{ github.run_number }}
          path: |
            build-integration-cov/coverage.xml
            build-integration-cov/coverage.html
            build-integration-cov/coverage-summary.txt
          if-no-files-found: error
      - name: Save coverage build cache
        if: ${{ success() && steps.restore-build-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            build-integration-cov
            ~/.cache/vcpkg/archives
          key: linux-build-coverage-${{ env.CI_CACHE_VERSION }}-gcc-prod-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake', 'tests/CMakeLists.txt', 'tests/cmake/**/*.cmake', 'simulation.ini', '.github/workflows/nightly-full.yml') }}
  deploy-coverage-pages:
    name: Deploy Coverage Pages
    needs: nightly-integration-coverage
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy coverage dashboard
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
  gpu-runner-readiness:
    name: GPU Runner Readiness
    uses: ./.github/workflows/gpu-runner-health.yml
    with:
      enable_gpu_lane: ${{ vars.HAS_GPU_RUNNER == 'true' }}
    secrets: inherit
  nightly-gpu-full-tests:
    name: Nightly GPU Full Tests (self-hosted windows/x64/cuda / python3.12, optional)
    needs: gpu-runner-readiness
    if: ${{ needs.gpu-runner-readiness.outputs.ready == 'true' }}
    runs-on: [self-hosted, windows, x64, cuda]
    timeout-minutes: 120
    steps:
      - {name: Checkout, uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd}
      - {name: Setup Python, uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405, with: {python-version: "${{ env.CI_PYTHON_VERSION }}"}}
      - name: Install Python test tooling
        shell: pwsh
        run: python -m pip install -r .github/ci/requirements-py312.txt
      - name: Setup MSVC toolchain
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756
        with: {arch: x64}
      - name: Validate CUDA runtime/toolchain presence
        shell: pwsh
        run: |
          $hasNvidiaSmi = Get-Command nvidia-smi -ErrorAction SilentlyContinue
          $hasNvcc = Get-Command nvcc -ErrorAction SilentlyContinue
          if (-not $hasNvidiaSmi) { throw "nvidia-smi not found. Runner does not expose NVIDIA driver/runtime." }
          if (-not $hasNvcc) { throw "nvcc not found in PATH. Install CUDA Toolkit or expose nvcc in runner environment." }
          nvidia-smi
          nvcc --version
      - name: Run repository quality gate
        shell: pwsh
        run: python tests/checks/check.py all --root . --config simulation.ini
      - name: Run Python style/type checks
        shell: pwsh
        run: |
          python -m ruff check .
          python -m mypy tests/checks scripts/ci python_tools
          python -m pytest -q tests/checks/suites
      - name: Configure
        shell: pwsh
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DGRAVITY_PROFILE=prod -DGRAVITY_STRICT_WARNINGS=ON
      - name: Build
        shell: pwsh
        run: cmake --build build --parallel
      - name: Run real server integration suites
        shell: pwsh
        run: |
          $server = Resolve-Path "build/myAppServer.exe"
          cmake -E env "GRAVITY_SERVER_EXE=$server" ctest --test-dir build --output-on-failure --timeout 300 --no-tests=error -R "TST_INT_PROT_|TST_INT_RUNT_|TST_CNT_RUNT_"
      - name: Run numerical validation campaign
        shell: pwsh
        run: |
          $tool = Resolve-Path "build/gravityNumericalValidationTool.exe"
          python scripts/ci/nightly/package_numerical_validation.py --root . --tool $tool --profile gpu-prod --dist-dir dist/numerical-validation
      - name: Run full tests
        shell: pwsh
        run: |
          $server = Resolve-Path "build/myAppServer.exe"
          cmake -E env "GRAVITY_SERVER_EXE=$server" ctest --test-dir build --output-on-failure --timeout 300 --no-tests=error
      - name: Upload numerical validation artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: nightly-numerical-validation-${{ github.run_number }}
          path: dist/numerical-validation
          if-no-files-found: error
  nightly-gpu-fallback:
    name: Nightly GPU Fallback (linux-ubuntu24.04)
    needs: gpu-runner-readiness
    if: ${{ needs.gpu-runner-readiness.outputs.ready != 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - {name: Record GPU fallback reason, run: 'echo "GPU lanes skipped: ${{ needs.gpu-runner-readiness.outputs.reason }}" >> "$GITHUB_STEP_SUMMARY"'}
