name: nightly-full

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-full-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nightly-cuda-build-and-test:
    name: Nightly CUDA Build and Tests
    runs-on: [self-hosted, windows, x64, cuda]
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --parallel

      - name: Run tests
        shell: pwsh
        run: |
          ctest --test-dir build --output-on-failure --timeout 300

      - name: Upload test and build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-full-logs-${{ github.run_number }}
          path: |
            build/Testing/**/*.log
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          if-no-files-found: ignore
