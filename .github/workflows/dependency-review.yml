name: dependency-review

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency Review (linux-ubuntu24.04)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Enforce dependency vulnerability policy
        uses: actions/dependency-review-action@4901385134134e04cec5fbe5ddfe3b2c5bd5d976
        with:
          fail-on-severity: high
