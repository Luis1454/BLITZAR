name: security-codeql

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

env:
  CI_CACHE_VERSION: v1

concurrency:
  group: security-codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }} / linux-ubuntu24.04)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: cpp
            build-mode: manual
          - language: python
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@38697555549f1db7851b81482ff19f1fa5c4fedc
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - name: Install build tools
        if: ${{ matrix.build-mode == 'manual' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
      - name: Restore CodeQL build cache
        id: restore-build-cache
        if: ${{ matrix.build-mode == 'manual' }}
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            build-codeql
            ~/.cache/vcpkg/archives
          key: linux-codeql-build-${{ env.CI_CACHE_VERSION }}-${{ matrix.language }}-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake', 'tests/CMakeLists.txt', 'tests/cmake/**/*.cmake', 'simulation.ini', '.github/workflows/security-codeql.yml') }}
          restore-keys: |
            linux-codeql-build-${{ env.CI_CACHE_VERSION }}-${{ matrix.language }}-
      - name: Configure CodeQL build
        if: ${{ matrix.build-mode == 'manual' }}
        run: |
          cmake -S tests -B build-codeql -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DGRAVITY_PROFILE=prod \
            -DGRAVITY_INTEGRATION_STRICT_WARNINGS=OFF \
            -DGRAVITY_INTEGRATION_ENABLE_SANITIZERS=OFF
      - name: Build CodeQL targets
        if: ${{ matrix.build-mode == 'manual' }}
        run: cmake --build build-codeql --parallel
      - name: Analyze
        uses: github/codeql-action/analyze@38697555549f1db7851b81482ff19f1fa5c4fedc
        with:
          category: /language:${{ matrix.language }}
      - name: Save CodeQL build cache
        if: ${{ success() && matrix.build-mode == 'manual' && steps.restore-build-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            build-codeql
            ~/.cache/vcpkg/archives
          key: linux-codeql-build-${{ env.CI_CACHE_VERSION }}-${{ matrix.language }}-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake', 'tests/CMakeLists.txt', 'tests/cmake/**/*.cmake', 'simulation.ini', '.github/workflows/security-codeql.yml') }}
