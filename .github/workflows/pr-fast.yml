name: pr-fast

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-fast-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-policy:
    name: PR Policy Guard
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate AGENTS PR policy
        run: |
          python tests/checks/pr_policy_check.py --event-name "${{ github.event_name }}" --event-path "${{ github.event_path }}"

  workflow-yaml-lint:
    name: Workflow YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install yamllint
        run: |
          python -m pip install --upgrade pip
          python -m pip install yamllint

      - name: Lint workflow files
        run: |
          yamllint -d "{extends: default, rules: {line-length: disable, truthy: disable}}" .github/workflows

  portable-smoke:
    name: Portable Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Verify generated directories are not tracked
        shell: pwsh
        run: |
          $failures = 0
          foreach ($tracked in @("build", "exports")) {
            $files = git ls-files $tracked
            if ($LASTEXITCODE -ne 0) {
              throw "git ls-files failed for $tracked"
            }
            if ($files) {
              Write-Host "Tracked generated path detected: $tracked"
              $failures = 1
            }
          }
          if ($failures -ne 0) { exit 1 }

      - name: Verify required project files
        shell: pwsh
        run: |
          foreach ($file in @(".gitignore", "CMakeLists.txt", "simulation.ini")) {
            if (-not (Test-Path $file)) {
              throw "Missing required file: $file"
            }
          }

      - name: Validate repository checks
        run: |
          python tests/checks/check.py all --root . --config simulation.ini

  space-quality-gate:
    name: NASA-First Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build and analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-tidy
          python -m pip install --upgrade pip
          python -m pip install pytest ruff mypy

      - name: Verify clang-tidy availability
        run: |
          clang-tidy --version

      - name: Run repository quality checks
        run: |
          python tests/checks/check.py all --root . --config simulation.ini

      - name: Run Python style/type checks
        run: |
          python -m ruff check .
          python -m mypy tests/checks scripts/ci python_tools

      - name: Configure strict integration build
        run: |
          cmake -S tests -B build-quality -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DGRAVITY_PROFILE=prod \
            -DGRAVITY_INTEGRATION_STRICT_WARNINGS=ON \
            -DGRAVITY_INTEGRATION_ENABLE_SANITIZERS=ON

      - name: Build strict integration targets
        run: |
          cmake --build build-quality --parallel

      - name: Run clang-tidy analyzer checks
        run: |
          python tests/checks/clang_tidy_check.py --root . --build-dir build-quality

      - name: Run integration tests under sanitizers
        run: |
          cmake -E env \
            ASAN_OPTIONS=detect_leaks=0:halt_on_error=1 \
            UBSAN_OPTIONS=halt_on_error=1 \
            ctest --test-dir build-quality --output-on-failure --timeout 180 --no-tests=error -R "ConfigArgsTest\\.TST_UNT_CONF_|TST_QLT_REPO_00(1|2|3|4|6|7|8|9)_"
