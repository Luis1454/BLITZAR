name: pr-fast

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-fast-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-yaml-lint:
    name: Workflow YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install yamllint
        run: |
          python -m pip install --upgrade pip
          python -m pip install yamllint

      - name: Lint workflow files
        run: |
          yamllint -d "{extends: default, rules: {line-length: disable, truthy: disable}}" .github/workflows

  repo-hygiene:
    name: Repo Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify generated directories are not tracked
        shell: bash
        run: |
          set -euo pipefail
          failures=0
          for tracked in build exports; do
            if git ls-files "$tracked" | grep -q .; then
              echo "Tracked generated path detected: $tracked"
              failures=1
            fi
          done
          if [ "$failures" -ne 0 ]; then
            exit 1
          fi

      - name: Verify required project files
        shell: bash
        run: |
          set -euo pipefail
          test -f .gitignore
          test -f CMakeLists.txt
          test -f simulation.ini

  config-smoke:
    name: Config Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate simulation.ini
        run: |
          python scripts/ci/validate_simulation_ini.py --path simulation.ini
