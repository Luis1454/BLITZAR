name: pr-fast

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CI_CACHE_VERSION: v1
  CI_PYTHON_VERSION: "3.12"

concurrency:
  group: pr-fast-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-policy:
    name: PR Policy Guard (linux-ubuntu24.04 / python3.12)
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04
    steps:
      - {name: Checkout, uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd}
      - {name: Setup Python, uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405, with: {python-version: "${{ env.CI_PYTHON_VERSION }}"}}
      - name: Validate AGENTS PR policy
        run: python tests/checks/run.py pr_policy --event-name "${{ github.event_name }}" --event-path "${{ github.event_path }}"

  main-delivery:
    name: Main Delivery Gate (linux-ubuntu24.04 / python3.12)
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-24.04
    steps:
      - {name: Checkout, uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd}
      - {name: Setup Python, uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405, with: {python-version: "${{ env.CI_PYTHON_VERSION }}"}}
      - name: Validate push-to-main provenance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python tests/checks/run.py main_delivery_gate --event-name "${{ github.event_name }}" --event-path "${{ github.event_path }}" --repo "${{ github.repository }}" --sha "${{ github.sha }}"

  traceability-gate:
    name: Traceability Gate (linux-ubuntu24.04 / python3.12)
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04
    permissions: {pull-requests: read, contents: read}
    steps:
      - {name: Checkout, uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd}
      - {name: Setup Python, uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405, with: {python-version: "${{ env.CI_PYTHON_VERSION }}"}}
      - name: Validate requirement traceability gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python tests/checks/run.py traceability_gate --event-name "${{ github.event_name }}" --event-path "${{ github.event_path }}" --repo "${{ github.repository }}"

  ivv-gate:
    name: IV&V Gate (linux-ubuntu24.04 / python3.12)
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04
    permissions: {pull-requests: read, contents: read}
    steps:
      - {name: Checkout, uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd}
      - {name: Setup Python, uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405, with: {python-version: "${{ env.CI_PYTHON_VERSION }}"}}
      - name: Validate IV&V independence gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python tests/checks/run.py ivv_gate --event-name "${{ github.event_name }}" --event-path "${{ github.event_path }}" --repo "${{ github.repository }}"

  workflow-yaml-lint:
    name: Workflow YAML Lint (linux-ubuntu24.04 / python3.12)
    runs-on: ubuntu-24.04
    steps:
      - {name: Checkout, uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd}
      - {name: Setup Python, uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405, with: {python-version: "${{ env.CI_PYTHON_VERSION }}"}}
      - name: Install yamllint
        run: |
          python -m pip install -r .github/ci/requirements-py312.txt
      - name: Lint workflow files
        run: >-
          yamllint -d "{extends: default, rules: {line-length: disable,
          truthy: disable, document-start: disable}}" .github/workflows

  portable-smoke:
    name: Portable Smoke (${{ matrix.axis }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            axis: linux-ubuntu24.04 / hosted-gnu / python3.12
          - os: windows-2022
            axis: windows-2022 / msvc2022-x64 / python3.12
    steps:
      - {name: Checkout, uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd}
      - {name: Setup Python, uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405, with: {python-version: "${{ env.CI_PYTHON_VERSION }}"}}
      - name: Verify generated directories are not tracked
        shell: pwsh
        run: |
          $failures = 0
          foreach ($tracked in @("build", "exports")) {
            $files = git ls-files $tracked
            if ($LASTEXITCODE -ne 0) { throw "git ls-files failed for $tracked" }
            if ($files) { Write-Host "Tracked generated path detected: $tracked"; $failures = 1 }
          }
          if ($failures -ne 0) { exit 1 }
      - name: Verify required project files
        shell: pwsh
        run: |
          foreach ($file in @(".gitignore", "CMakeLists.txt", "simulation.ini")) {
            if (-not (Test-Path $file)) { throw "Missing required file: $file" }
          }
      - name: Validate repository checks
        run: python tests/checks/check.py all --root . --config simulation.ini

  dev-module-build:
    name: Dev Module Build (${{ matrix.axis }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            axis: windows-2022 / msvc2022-x64 / cuda-from-runner / python3.12
            install_tools: ""
            qt_target: gravityClientModuleQtInProc
          - os: ubuntu-24.04
            axis: linux-ubuntu24.04 / hosted-gnu / cuda-from-runner / python3.12
            install_tools: "sudo apt-get update && sudo apt-get install -y ninja-build"
            qt_target: ""
    steps:
      - {name: Checkout, uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd}
      - name: Install build tools
        if: ${{ matrix.install_tools != '' }}
        run: ${{ matrix.install_tools }}
      - name: Detect CUDA toolkit
        id: cuda
        shell: bash
        run: |
          if command -v nvcc >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "CUDA toolkit unavailable; skipping dev module build."
          fi
      - name: Restore dev-module build cache
        id: restore-dev-module-cache
        if: ${{ steps.cuda.outputs.available == 'true' }}
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: build-dev-mod
          key: ${{ runner.os }}-dev-module-${{ env.CI_CACHE_VERSION }}-${{ matrix.os }}-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake', 'simulation.ini', '.github/workflows/pr-fast.yml') }}
          restore-keys: |
            ${{ runner.os }}-dev-module-${{ env.CI_CACHE_VERSION }}-${{ matrix.os }}-
      - name: Configure dev module build
        if: ${{ steps.cuda.outputs.available == 'true' }}
        shell: bash
        run: |
          cmake -S . -B build-dev-mod -G Ninja \
            -DGRAVITY_PROFILE=dev \
            -DGRAVITY_BUILD_CLIENT_MODULE_HOST=ON \
            -DGRAVITY_BUILD_CLIENT_MODULES=ON \
            -DGRAVITY_BUILD_TESTS=OFF
      - name: Build required module targets
        if: ${{ steps.cuda.outputs.available == 'true' }}
        shell: bash
        run: |
          cmake --build build-dev-mod --parallel --target \
            myAppClient \
            gravityClientModuleCli \
            gravityClientModuleEcho \
            gravityClientModuleGuiProxy
      - name: Build optional Qt module target
        if: ${{ steps.cuda.outputs.available == 'true' && matrix.qt_target != '' }}
        shell: bash
        run: cmake --build build-dev-mod --parallel --target ${{ matrix.qt_target }} || echo "Qt module target unavailable in this environment, skipping."
      - name: Save dev-module build cache
        if: ${{ success() && steps.cuda.outputs.available == 'true' && steps.restore-dev-module-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: build-dev-mod
          key: ${{ runner.os }}-dev-module-${{ env.CI_CACHE_VERSION }}-${{ matrix.os }}-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake', 'simulation.ini', '.github/workflows/pr-fast.yml') }}
      - name: Skip dev module build when CUDA is unavailable
        if: ${{ steps.cuda.outputs.available != 'true' }}
        shell: bash
        run: echo "Skipped dev module build because nvcc is not available on this runner."

  space-quality-gate:
    uses: ./.github/workflows/pr-fast-quality-gate.yml
    with:
      diff-base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
      diff-target: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}
