name: pr-fast

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-fast-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-yaml-lint:
    name: Workflow YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install yamllint
        run: |
          python -m pip install --upgrade pip
          python -m pip install yamllint

      - name: Lint workflow files
        run: |
          yamllint -d "{extends: default, rules: {line-length: disable, truthy: disable}}" .github/workflows

  portable-smoke:
    name: Portable Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify generated directories are not tracked
        shell: pwsh
        run: |
          $failures = 0
          foreach ($tracked in @("build", "exports")) {
            $files = git ls-files $tracked
            if ($LASTEXITCODE -ne 0) {
              throw "git ls-files failed for $tracked"
            }
            if ($files) {
              Write-Host "Tracked generated path detected: $tracked"
              $failures = 1
            }
          }
          if ($failures -ne 0) { exit 1 }

      - name: Verify required project files
        shell: pwsh
        run: |
          foreach ($file in @(".gitignore", "CMakeLists.txt", "simulation.ini")) {
            if (-not (Test-Path $file)) {
              throw "Missing required file: $file"
            }
          }

      - name: Validate simulation.ini
        run: |
          cmake -DGRAVITY_CONFIG_PATH:FILEPATH=simulation.ini -P tests/config/validate_simulation_ini.cmake
