name: release-lane

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update, for example v1.2.3"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a pre-release"
        required: false
        default: false
        type: boolean
      draft:
        description: "Create or keep the GitHub release as a draft"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  CI_CACHE_VERSION: v1
  CI_PYTHON_VERSION: "3.12"
  QT_VERSION: "6.8.2"
  QT_ARCH: win64_msvc2022_64
  QT_DIR: C:\Qt\6.8.2\msvc2022_64
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

concurrency:
  group: release-lane-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-integration-validate-and-package:
    name: Release Integration Validate and Package (windows-2022 / msvc2022-x64 / cuda12.4.1 / python3.12)
    runs-on: windows-2022
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "${{ env.CI_PYTHON_VERSION }}"
      - name: Restore pip cache
        id: restore-pip-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: ~\AppData\Local\pip\Cache
          key: windows-release-pip-${{ env.CI_CACHE_VERSION }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('.github/ci/requirements-py312.txt', '.github/workflows/release-lane.yml') }}
          restore-keys: |
            windows-release-pip-${{ env.CI_CACHE_VERSION }}-${{ steps.setup-python.outputs.python-version }}-
      - name: Install Python test tooling
        shell: pwsh
        run: python -m pip install -r .github/ci/requirements-py312.txt
      - name: Save pip cache
        if: ${{ success() && steps.restore-pip-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: ~\AppData\Local\pip\Cache
          key: windows-release-pip-${{ env.CI_CACHE_VERSION }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('.github/ci/requirements-py312.txt', '.github/workflows/release-lane.yml') }}

      - name: Setup MSVC toolchain
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756
        with:
          arch: x64

      - name: Run repository quality gate
        shell: pwsh
        run: |
          python tests/checks/check.py all --root . --config simulation.ini

      - name: Run Python style/type checks
        shell: pwsh
        run: |
          python -m ruff check .
          python -m mypy tests/checks scripts/ci python_tools
          python -m pytest -q tests/checks/suites

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@b6fc3a9f3f15256d9d94ffe1254f9c5a2565cde6
        with:
          cuda: "12.4.1"

      - name: Restore Qt desktop cache
        id: restore-qt-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: C:\Qt\${{ env.QT_VERSION }}\msvc2022_64
          key: windows-release-qt-${{ env.CI_CACHE_VERSION }}-${{ env.QT_VERSION }}-${{ env.QT_ARCH }}

      - name: Install Qt desktop runtime
        if: ${{ steps.restore-qt-cache.outputs.cache-hit != 'true' }}
        shell: pwsh
        run: |
          python -m aqt install-qt windows desktop "${{ env.QT_VERSION }}" "${{ env.QT_ARCH }}" -O C:\Qt --archives qtbase

      - name: Validate CUDA toolchain presence
        shell: pwsh
        run: |
          $hasNvcc = Get-Command nvcc -ErrorAction SilentlyContinue
          if (-not $hasNvcc) {
            throw "nvcc not found in PATH after CUDA toolkit installation."
          }
          nvcc --version

      - name: Generate tool qualification manifest
        shell: pwsh
        run: |
          python scripts/ci/release/package_tool_manifest.py --lane release-lane --profile prod --output dist/tool-qualification/tool_manifest.json
      - name: Restore release build cache
        id: restore-build-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: |
            build
            ~\AppData\Local\vcpkg\archives
            C:\vcpkg\installed
            C:\vcpkg\packages
          key: windows-release-build-${{ env.CI_CACHE_VERSION }}-msvc-cuda-prod-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake', 'simulation.ini', '.github/ci/requirements-py312.txt', '.github/workflows/release-lane.yml') }}
          restore-keys: |
            windows-release-build-${{ env.CI_CACHE_VERSION }}-msvc-cuda-prod-

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBLITZAR_PROFILE=prod -DBLITZAR_STRICT_WARNINGS=ON

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --parallel

      - name: Run integration-safe tests
        shell: pwsh
        run: |
          ctest --test-dir build --output-on-failure --timeout 180 --no-tests=error -R "TST_UNT_CONF_|TST_QLT_REPO_00(1|2|3|4|5|6|7)_"
          ctest --test-dir build --output-on-failure --timeout 180 --no-tests=error -R "TST_UNT_PROT_00(1|2|3|4|5|6)_|TST_UNT_MODCLI_00(6|7|8|9)_|TST_UNT_MODCLI_01(0|1|2)_"
          ctest --test-dir build --output-on-failure --timeout 180 --no-tests=error -R "TST_UNT_PHYS_00(6|7|8|9)_|TST_UNT_PHYS_010_|TST_UNT_PHYS_01(4|5|6)_|TST_UNT_PHYS_021_"

      - name: Package release artifacts
        run: |
          python scripts/ci/release/package_bundle.py --build-dir build --dist-dir dist/release-bundle --tag "${{ env.RELEASE_TAG }}" --tool-manifest dist/tool-qualification/tool_manifest.json

      - name: Smoke-validate portable release bundle
        shell: pwsh
        run: |
          python scripts/ci/release/smoke_portable_bundle.py --archive (Get-ChildItem dist/release-bundle/*.zip | Select-Object -First 1).FullName --extract-dir dist/release-bundle-smoke

      - name: Configure desktop GUI build
        shell: pwsh
        run: |
          cmake -S . -B build-desktop -G Ninja -DCMAKE_BUILD_TYPE=Release -DBLITZAR_PROFILE=dev -DBLITZAR_BUILD_TESTS=OFF -DCMAKE_PREFIX_PATH="${{ env.QT_DIR }}"

      - name: Build desktop GUI targets
        shell: pwsh
        run: |
          cmake --build build-desktop --target blitzar blitzar-server blitzar-client blitzarClientModuleQtInProc --parallel

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress

      - name: Validate desktop GUI runtime
        shell: pwsh
        run: |
          if (-not (Test-Path build-desktop\blitzarClientModuleQtInProc.dll)) {
            throw "Qt GUI module was not built."
          }
          if (-not (Test-Path build-desktop\platforms\qwindows.dll)) {
            & "${{ env.QT_DIR }}\bin\windeployqt.exe" --dir build-desktop --release --compiler-runtime build-desktop\blitzarClientModuleQtInProc.dll
          }
          if (-not (Test-Path build-desktop\platforms\qwindows.dll)) {
            throw "Qt platform plugin qwindows.dll is missing from desktop runtime."
          }

      - name: Package desktop GUI installer
        shell: pwsh
        run: |
          python scripts/ci/release/package_bundle.py --build-dir build-desktop --dist-dir dist/desktop-installer --tag "${{ env.RELEASE_TAG }}" --tool-manifest dist/tool-qualification/tool_manifest.json --artifact-kind desktop-installer

      - name: Smoke-validate desktop GUI installer
        shell: pwsh
        run: |
          python scripts/ci/release/smoke_windows_installer.py --installer (Get-ChildItem dist/desktop-installer/*.exe | Select-Object -First 1).FullName --extract-dir dist/desktop-installer-smoke

      - name: Package release SBOM
        run: |
          python scripts/ci/release/package_sbom.py --artifacts-dir dist/release-bundle --dist-dir dist/release-sbom --tag "${{ env.RELEASE_TAG }}"

      - name: Package release evidence
        run: |
          python scripts/ci/release/package_evidence.py --root . --dist-dir dist/evidence-pack --profile prod --tag "${{ env.RELEASE_TAG }}"

      - name: Package release quality index
        run: |
          python scripts/ci/release/package_quality_index.py --root . --dist-dir dist/release-quality-index --profile prod --tag "${{ env.RELEASE_TAG }}"

      - name: Package source archive
        run: |
          python scripts/ci/release/package_source.py --repo-root . --dist-dir dist/source --tag "${{ env.RELEASE_TAG }}" --ref HEAD

      - name: Upload release bundle
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: release-bundle-${{ env.RELEASE_TAG }}
          path: dist/release-bundle/*.zip
          if-no-files-found: error

      - name: Upload desktop GUI installer
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: desktop-installer-${{ env.RELEASE_TAG }}
          path: dist/desktop-installer/*.exe
          if-no-files-found: error

      - name: Upload source archive
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: release-source-${{ env.RELEASE_TAG }}
          path: dist/source/*.zip
          if-no-files-found: error

      - name: Upload tool qualification manifest
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: tool-qualification-release-${{ env.RELEASE_TAG }}
          path: dist/tool-qualification/tool_manifest.json
          if-no-files-found: error

      - name: Upload release SBOM
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: release-sbom-${{ env.RELEASE_TAG }}
          path: dist/release-sbom/*.json
          if-no-files-found: error

      - name: Upload release evidence pack
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: release-evidence-${{ env.RELEASE_TAG }}
          path: dist/evidence-pack/*.zip
          if-no-files-found: error

      - name: Upload release quality index
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: release-quality-index-${{ env.RELEASE_TAG }}
          path: dist/release-quality-index/*.zip
          if-no-files-found: error

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: release-lane-logs-${{ github.run_number }}
          path: |
            build/Testing/**/*.log
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          if-no-files-found: ignore
      - name: Save release build cache
        if: ${{ success() && steps.restore-build-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: |
            build
            ~\AppData\Local\vcpkg\archives
            C:\vcpkg\installed
            C:\vcpkg\packages
          key: windows-release-build-${{ env.CI_CACHE_VERSION }}-msvc-cuda-prod-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake', 'simulation.ini', '.github/ci/requirements-py312.txt', '.github/workflows/release-lane.yml') }}

  publish-github-release:
    name: Publish GitHub Release (windows-2022 / python3.12)
    needs: release-integration-validate-and-package
    runs-on: windows-2022
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "${{ env.CI_PYTHON_VERSION }}"

      - name: Install Python tooling
        shell: pwsh
        run: python -m pip install -r .github/ci/requirements-py312.txt

      - name: Download release bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-bundle-${{ env.RELEASE_TAG }}
          path: dist/release-bundle

      - name: Download desktop GUI installer
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: desktop-installer-${{ env.RELEASE_TAG }}
          path: dist/desktop-installer

      - name: Download source archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-source-${{ env.RELEASE_TAG }}
          path: dist/source

      - name: Download release SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-sbom-${{ env.RELEASE_TAG }}
          path: dist/release-sbom

      - name: Download release evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-evidence-${{ env.RELEASE_TAG }}
          path: dist/evidence-pack

      - name: Download release quality index
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-quality-index-${{ env.RELEASE_TAG }}
          path: dist/release-quality-index

      - name: Prepare release tag for changelog
        shell: pwsh
        run: |
          $tag = "${{ env.RELEASE_TAG }}"
          $existing = git rev-parse -q --verify "refs/tags/$tag" 2>$null
          if (-not $existing) {
            git tag $tag "${{ github.sha }}"
          }

      - name: Generate changelog
        shell: pwsh
        run: |
          python scripts/ci/release/generate_changelog.py `
            --tag "${{ env.RELEASE_TAG }}" `
            --repo-root . `
            --output dist/CHANGELOG.md

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $args = @(
            "scripts/ci/release/publish_release.py",
            "--tag", "${{ env.RELEASE_TAG }}",
            "--target", "${{ github.sha }}",
            "--notes-file", "dist/CHANGELOG.md",
            "--assets",
            "dist/source/*.zip",
            "dist/release-bundle/*.zip",
            "dist/desktop-installer/*.exe",
            "dist/release-sbom/*.json",
            "dist/evidence-pack/*.zip",
            "dist/release-quality-index/*.zip"
          )
          if ("${{ inputs.prerelease }}" -eq "true") {
            $args += "--prerelease"
          }
          if ("${{ inputs.draft }}" -eq "true") {
            $args += "--draft"
          }
          python @args

  gpu-runner-readiness:
    name: GPU Runner Readiness
    uses: ./.github/workflows/gpu-runner-health.yml
    with:
      enable_gpu_lane: ${{ vars.HAS_GPU_RUNNER == 'true' }}
    secrets: inherit

  release-gpu-full-tests:
    name: Release GPU Full Tests (self-hosted windows/x64/cuda / python3.12, optional)
    needs: gpu-runner-readiness
    if: ${{ needs.gpu-runner-readiness.outputs.ready == 'true' }}
    runs-on: [self-hosted, windows, x64, cuda]
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "${{ env.CI_PYTHON_VERSION }}"
      - name: Restore pip cache
        id: restore-pip-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: ~\AppData\Local\pip\Cache
          key: windows-release-gpu-pip-${{ env.CI_CACHE_VERSION }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('.github/ci/requirements-py312.txt', '.github/workflows/release-lane.yml') }}
          restore-keys: |
            windows-release-gpu-pip-${{ env.CI_CACHE_VERSION }}-${{ steps.setup-python.outputs.python-version }}-
      - name: Install Python test tooling
        shell: pwsh
        run: python -m pip install -r .github/ci/requirements-py312.txt
      - name: Save pip cache
        if: ${{ success() && steps.restore-pip-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: ~\AppData\Local\pip\Cache
          key: windows-release-gpu-pip-${{ env.CI_CACHE_VERSION }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('.github/ci/requirements-py312.txt', '.github/workflows/release-lane.yml') }}

      - name: Setup MSVC toolchain
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756
        with:
          arch: x64
      - name: Run Python style/type checks
        shell: pwsh
        run: |
          python -m ruff check .
          python -m mypy tests/checks scripts/ci python_tools
          python -m pytest -q tests/checks/suites

      - name: Validate CUDA runtime/toolchain presence
        shell: pwsh
        run: |
          $hasNvidiaSmi = Get-Command nvidia-smi -ErrorAction SilentlyContinue
          $hasNvcc = Get-Command nvcc -ErrorAction SilentlyContinue
          if (-not $hasNvidiaSmi) {
            throw "nvidia-smi not found. Runner does not expose NVIDIA driver/runtime."
          }
          if (-not $hasNvcc) {
            throw "nvcc not found in PATH. Install CUDA Toolkit or expose nvcc in runner environment."
          }
          nvidia-smi
          nvcc --version
      - name: Restore GPU release build cache
        id: restore-build-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: |
            build
            ~\AppData\Local\vcpkg\archives
            C:\vcpkg\installed
            C:\vcpkg\packages
          key: windows-release-gpu-build-${{ env.CI_CACHE_VERSION }}-msvc-cuda-prod-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake', 'simulation.ini', '.github/ci/requirements-py312.txt', '.github/workflows/release-lane.yml') }}
          restore-keys: |
            windows-release-gpu-build-${{ env.CI_CACHE_VERSION }}-msvc-cuda-prod-

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBLITZAR_PROFILE=prod -DBLITZAR_STRICT_WARNINGS=ON

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --parallel

      - name: Run full tests
        shell: pwsh
        run: |
          ctest --test-dir build --output-on-failure --timeout 300 --no-tests=error
      - name: Save GPU release build cache
        if: ${{ success() && steps.restore-build-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: |
            build
            ~\AppData\Local\vcpkg\archives
            C:\vcpkg\installed
            C:\vcpkg\packages
          key: windows-release-gpu-build-${{ env.CI_CACHE_VERSION }}-msvc-cuda-prod-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake', 'simulation.ini', '.github/ci/requirements-py312.txt', '.github/workflows/release-lane.yml') }}

  release-gpu-fallback:
    name: Release GPU Fallback (linux-ubuntu24.04)
    needs: gpu-runner-readiness
    if: ${{ needs.gpu-runner-readiness.outputs.ready != 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - {name: Record GPU fallback reason, run: 'echo "GPU release lane skipped: ${{ needs.gpu-runner-readiness.outputs.reason }}" >> "$GITHUB_STEP_SUMMARY"'}
